name: Ghostex Android Release Candidate

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Semantic version for the Ghostex Android APK/AAB."
        required: true
        default: "0.1.0"
      version_code:
        description: "Positive Android versionCode for the Ghostex Android APK/AAB."
        required: true
        default: "118"
      require_signing:
        description: "Require release signing secrets and fail if any signing input is missing."
        required: true
        type: boolean
        default: false
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/ghostex_android_release_candidate.yml"
      - "app/**"
      - "fastlane/**"
      - "gradle/**"
      - "terminal-emulator/**"
      - "terminal-view/**"
      - "termux-shared/**"
      - "tools/**"
      - "build.gradle"
      - "gradle.properties"
      - "gradlew"
      - "settings.gradle"
  pull_request:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/ghostex_android_release_candidate.yml"
      - "app/**"
      - "fastlane/**"
      - "gradle/**"
      - "terminal-emulator/**"
      - "terminal-view/**"
      - "termux-shared/**"
      - "tools/**"
      - "build.gradle"
      - "gradle.properties"
      - "gradlew"
      - "settings.gradle"

permissions:
  contents: read

concurrency:
  group: ghostex-android-release-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-candidate:
    name: Build Ghostex Android release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      GHOSTEX_ANDROID_VERSION_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version_name || '0.1.0' }}
      GHOSTEX_ANDROID_VERSION_CODE: ${{ github.event_name == 'workflow_dispatch' && inputs.version_code || '118' }}
      GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING: ${{ github.event_name == 'workflow_dispatch' && inputs.require_signing && '1' || '0' }}
      TERMUX_PACKAGE_VARIANT: apt-android-7

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Ghostex release inputs
        shell: bash
        run: |
          set -euo pipefail

          version_name="${GHOSTEX_ANDROID_VERSION_NAME}"
          version_code="${GHOSTEX_ANDROID_VERSION_CODE}"
          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ ! "$version_name" =~ $semver_regex ]]; then
            echo "GHOSTEX_ANDROID_VERSION_NAME must be a semantic version: $version_name" >&2
            exit 1
          fi
          if [[ ! "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "GHOSTEX_ANDROID_VERSION_CODE must be a positive integer: $version_code" >&2
            exit 1
          fi
          if [[ "$GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING" != "0" && "$GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING" != "1" ]]; then
            echo "GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING must be 0 or 1." >&2
            exit 1
          fi

      - name: Decode release signing keystore
        if: env.GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING == '1'
        shell: bash
        env:
          GHOSTEX_ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.GHOSTEX_ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${GHOSTEX_ANDROID_SIGNING_KEYSTORE_BASE64}" ]]; then
            echo "Missing GHOSTEX_ANDROID_SIGNING_KEYSTORE_BASE64 secret." >&2
            exit 1
          fi

          keystore_path="${RUNNER_TEMP}/ghostex-android-release.jks"
          printf '%s' "${GHOSTEX_ANDROID_SIGNING_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          chmod 600 "${keystore_path}"
          echo "GHOSTEX_ANDROID_SIGNING_STORE_FILE=${keystore_path}" >> "${GITHUB_ENV}"

      - name: Verify and build unsigned release artifacts
        if: env.GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING != '1'
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew --no-daemon \
            :app:testDebugUnitTest \
            :app:compileDebugAndroidTestJavaWithJavac \
            :app:assembleRelease \
            :app:bundleRelease \
            :app:lintRelease

      - name: Verify and build signed release artifacts
        if: env.GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING == '1'
        shell: bash
        env:
          GHOSTEX_ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.GHOSTEX_ANDROID_SIGNING_STORE_PASSWORD }}
          GHOSTEX_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.GHOSTEX_ANDROID_SIGNING_KEY_ALIAS }}
          GHOSTEX_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.GHOSTEX_ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ "$GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING" == "1" ]]; then
            for name in GHOSTEX_ANDROID_SIGNING_STORE_FILE GHOSTEX_ANDROID_SIGNING_STORE_PASSWORD GHOSTEX_ANDROID_SIGNING_KEY_ALIAS GHOSTEX_ANDROID_SIGNING_KEY_PASSWORD; do
              if [[ -z "${!name:-}" ]]; then
                echo "Missing required release signing value: ${name}" >&2
                exit 1
              fi
            done
          fi

          ./gradlew --no-daemon \
            :app:testDebugUnitTest \
            :app:compileDebugAndroidTestJavaWithJavac \
            :app:assembleRelease \
            :app:bundleRelease \
            :app:lintRelease

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew --no-daemon :app:verifyGhostexReleaseChecksums

      - name: Verify signed release artifacts
        if: env.GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING == '1'
        shell: bash
        run: |
          set -euo pipefail

          tools/ghostex-android-verify-release-signatures.sh

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ghostex-android-release-candidate-${{ env.GHOSTEX_ANDROID_VERSION_NAME }}-${{ env.GHOSTEX_ANDROID_VERSION_CODE }}
          path: |
            app/build/outputs/apk/release/ghostex-android_*.apk
            app/build/outputs/apk/release/output-metadata.json
            app/build/outputs/apk/release/SHA256SUMS
            app/build/outputs/bundle/release/ghostex-android_*.aab
            app/build/outputs/bundle/release/SHA256SUMS
            app/build/reports/lint-results-release.html
            app/build/reports/lint-results-release.xml
            app/build/reports/lint-results-release.txt
            app/build/reports/tests/testDebugUnitTest/**
            tools/ghostex-android-adb.sh
            tools/ghostex-android-device-e2e.sh
            tools/ghostex-android-ui-smoke.sh
            tools/ghostex-android-verify-release-signatures.sh
          if-no-files-found: error

      - name: Summarize live E2E requirement
        shell: bash
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## Ghostex Android release candidate

          The APK and AAB have passed source, manifest, signing, metadata, Android test compilation, unit test, release lint, and release assembly gates. The artifact includes the release APK/AAB, checksums, release lint reports, unit-test HTML reports, and the connected-device QA harnesses.

          Before publishing, run the real-device Tailscale/SSH/Ghostex/ZMX harness and the first-run UI smoke from a Mac with an attached disposable Android device:

          ```bash
          GHOSTEX_ANDROID_CONFIRM_CLEAR_DATA=1 \
          GHOSTEX_ANDROID_HOST=<tailscale-ip-or-hostname> \
          GHOSTEX_ANDROID_USER=<ssh-user> \
          GHOSTEX_ANDROID_PASSWORD=<ssh-password> \
          ./tools/ghostex-android-device-e2e.sh

          GHOSTEX_ANDROID_CONFIRM_CLEAR_DATA=1 \
          ./tools/ghostex-android-ui-smoke.sh
          ```
          EOF
