            }
        }

        workflowDir.eachFileMatch(~/.*\.ya?ml/) { workflow ->
            def text = workflow.getText("UTF-8")
            [
                "actions/checkout@v5",
                "actions/checkout@v6",
                "actions/setup-java@v5",
                "actions/setup-java@v6",
                "actions/upload-artifact@v5",
                "actions/upload-artifact@v6",
                "gradle/actions/dependency-submission@v5",
                "gradle/actions/wrapper-validation@5"
            ].each { forbidden ->
                if (text.contains(forbidden)) violations.add(workflow.name + " uses unverified workflow action major " + forbidden)
            }
            if (text.contains("APK_BASENAME_PREFIX=\"termux-app_")) {
                violations.add(workflow.name + " still expects Termux-branded APK artifact names")
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Ghostex Android CI/release surface is not release-ready: " + violations.join(", "))
        }
    }
}

def findManifestTagForComponent(String text, String componentName) {
    def candidates = [componentName]
    if (componentName.startsWith(".")) {
        /*
        CDXC:AndroidReleaseSurface 2026-05-20-12:54:
        Release manifests keep upstream Java component names under the
        `com.termux` namespace while the installable runtime package is
        `io.ghostex`. Check both identities so entry-point gates verify the
        locked-down manifest instead of treating namespace-preserved components
        as missing.
        */
        candidates.add("com.termux" + componentName)
        candidates.add(project.ext.ghostexRuntimePackageName + componentName)
    }
    for (String candidate : candidates) {
        def escapedName = java.util.regex.Pattern.quote(candidate)
        def matcher = text =~ /<(activity|activity-alias|provider|receiver|service)\b(?=[^>]*android:name="${escapedName}")[^>]*>/
        if (matcher.find()) return matcher.group(0)
    }
    return null
}

def hasAndroidAttribute(String text, String attribute, String value) {
    return text.contains("android:" + attribute + "=\"" + value + "\"")
}

