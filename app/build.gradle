def validateImage(File file, int expectedWidth, int expectedHeight, String label, List violations) {
    if (!file.isFile()) {
        violations.add(label + " is missing")
        return
    }
    def image = javax.imageio.ImageIO.read(file)
    if (image == null) {
        violations.add(label + " is not readable image data")
        return
    }
    if (image.getWidth() != expectedWidth || image.getHeight() != expectedHeight) {
        violations.add(label + " must be " + expectedWidth + "x" + expectedHeight + " but was " + image.getWidth() + "x" + image.getHeight())
    }
}

def ghostexReleaseArtifacts(File directory, java.util.regex.Pattern pattern) {
    def files = directory.listFiles({ File dir, String name ->
        pattern.matcher(name).matches()
    } as FilenameFilter) ?: [] as File[]
    return files.toList().sort { it.name }
}

def ghostexReleaseApksFromMetadata(File apkDir) {
    /*
    CDXC:AndroidReleaseCI 2026-05-17-21:44:
    The Gradle output metadata is the authoritative APK handoff list. Use it
    for checksums and reject extra Ghostex APK files in the output directory so
    stale artifacts cannot be signed, uploaded, or treated as release evidence.
    */
    def metadata = new File(apkDir, "output-metadata.json")
    if (!metadata.isFile()) {
        throw new GradleException("Missing release APK output metadata: " + metadata)
    }
    def parsed = new groovy.json.JsonSlurper().parse(metadata)
    def apks = []
    parsed.elements.each { element ->
        def outputFile = element.outputFile == null ? "" : element.outputFile.toString()
        if (!outputFile.startsWith("ghostex-android_") || !outputFile.endsWith(".apk")) {
            throw new GradleException("Release APK output metadata contains unexpected artifact name: " + outputFile)
        }
        def apk = new File(apkDir, outputFile)
        if (!apk.isFile()) {
            throw new GradleException("Release APK output metadata references a missing artifact: " + apk)
        }
        apks.add(apk)
    }
    def metadataNames = apks.collect { it.name } as Set
    def extraApks = ghostexReleaseArtifacts(apkDir, ~/ghostex-android_.*\.apk/).findAll { !metadataNames.contains(it.name) }
    if (!extraApks.isEmpty()) {
        throw new GradleException("Release APK output directory contains stale Ghostex artifacts not listed in output-metadata.json: " + extraApks.collect { it.name }.join(", "))
    }
    return apks.sort { it.name }
}

def writeGhostexReleaseSha256Sums(File output, List<File> artifacts) {
    output.parentFile.mkdirs()
    output.withWriter("UTF-8") { writer ->
        artifacts.each { artifact ->
            writer.write(ghostexSha256(artifact) + "  " + artifact.name + "\n")
        }
    }
}

def verifyGhostexReleaseSha256Sums(File sumsFile, List<File> artifacts, String label) {
    if (!sumsFile.isFile()) {
        throw new GradleException("Missing SHA256SUMS for " + label + ": " + sumsFile)
    }
    if (artifacts.isEmpty()) {
        throw new GradleException("No Ghostex Android " + label + " artifacts found beside " + sumsFile + ".")
    }
    def expected = artifacts.collectEntries { artifact ->
        [(artifact.name): ghostexSha256(artifact)]
    }
    def actual = [:]
    sumsFile.eachLine("UTF-8") { line ->
        def matcher = line =~ /^([0-9a-f]{64})  ([^\/\\]+)$/
        if (!matcher.matches()) {
            throw new GradleException("Malformed SHA256SUMS line for " + label + ": " + line)
        }
        actual[matcher.group(2)] = matcher.group(1)
    }
    if (actual != expected) {
        throw new GradleException("SHA256SUMS for " + label + " does not match current artifacts. Expected " + expected + " but found " + actual + ".")
    }
}

def ghostexSha256(File file) {
    def digest = java.security.MessageDigest.getInstance("SHA-256")
    file.withInputStream { input ->
        def buffer = new byte[8192]
        int read
        while ((read = input.read(buffer)) != -1) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().collect { String.format("%02x", it & 0xff) }.join()
}

def validateApproxImagePixel(File file, int x, int y, int expectedRed, int expectedGreen,
                             int expectedBlue, int tolerance, String label, List violations) {
    if (!file.isFile()) return
    def image = javax.imageio.ImageIO.read(file)
    if (image == null) return
    if (x < 0 || y < 0 || x >= image.getWidth() || y >= image.getHeight()) {
        violations.add(label + " sample point is outside image bounds")
        return
    }
    int rgb = image.getRGB(x, y)
    int red = (rgb >> 16) & 0xff
    int green = (rgb >> 8) & 0xff
    int blue = rgb & 0xff
    if (Math.abs(red - expectedRed) > tolerance ||
        Math.abs(green - expectedGreen) > tolerance ||
        Math.abs(blue - expectedBlue) > tolerance) {
        violations.add(label + " pixel must be close to #" +
            String.format("%02X%02X%02X", expectedRed, expectedGreen, expectedBlue) +
            " but was #" + String.format("%02X%02X%02X", red, green, blue))
    }
}

