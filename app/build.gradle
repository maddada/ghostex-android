plugins {
    id "com.android.application"
}

ext {
    // The packageVariant defines the bootstrap variant that will be included in the app APK.
    // This must be supported by com.termux.shared.termux.TermuxBootstrap.PackageVariant or app will
    // crash at startup.
    // Bootstrap of a different variant must not be manually installed by the user after app installation
    // by replacing $PREFIX since app code is dependant on the variant used to build the APK.
    // Currently supported values are: [ "apt-android-7" "apt-android-5" ]
    packageVariant = System.getenv("TERMUX_PACKAGE_VARIANT") ?: "apt-android-7" // Default: "apt-android-7"
    upstreamTermuxRuntimePackageName = "com.termux"
    /*
    CDXC:AndroidSideBySideInstall 2026-05-17-23:39:
    Ghostex Android must install next to upstream Termux, so its runtime
    application id cannot be `com.termux`. Keep the Java namespace upstream-
    shaped, but use a Ghostex-owned Android package id that has the same byte
    length as `com.termux`; the current bundled bootstrap contains absolute
    prefix strings and can only be patched safely in-place when the replacement
    prefix length is identical.

    CDXC:AndroidBranding 2026-05-18-06:41:
    The side-by-side runtime id should spell the product as Ghostex. Use
    `io.ghostex` because it is the same byte length as `com.termux`, keeping
    bootstrap prefix patching valid while fixing package-visible branding.
    */
    ghostexRuntimePackageName = stringPropertyOrEnv(project, "ghostexAndroidPackageName", "GHOSTEX_ANDROID_PACKAGE_NAME") ?: "io.ghostex"
}

def ghostexReleaseSigning = resolveGhostexAndroidReleaseSigning(project)
def ghostexAppVersionName = stringPropertyOrEnv(project, "ghostexAndroidVersionName", "GHOSTEX_ANDROID_VERSION_NAME")
    ?: stringPropertyOrEnv(project, "termuxAppVersionName", "TERMUX_APP_VERSION_NAME")
    ?: "0.1.0"
def ghostexAppVersionCode = positiveIntegerPropertyOrEnv(project, "ghostexAndroidVersionCode", "GHOSTEX_ANDROID_VERSION_CODE", 118)

android {
    namespace "com.termux"

    compileSdkVersion project.properties.compileSdkVersion.toInteger()
    ndkVersion = System.getenv("JITPACK_NDK_VERSION") ?: project.properties.ndkVersion
    def apkVersionTag = stringPropertyOrEnv(project, "ghostexAndroidApkVersionTag", "GHOSTEX_ANDROID_APK_VERSION_TAG")
        ?: stringPropertyOrEnv(project, "termuxApkVersionTag", "TERMUX_APK_VERSION_TAG")
        ?: ""
    def splitAPKsForDebugBuilds = System.getenv("TERMUX_SPLIT_APKS_FOR_DEBUG_BUILDS") ?: "1"
    def splitAPKsForReleaseBuilds = System.getenv("TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS") ?: "0" // F-Droid does not support split APKs #1904

    dependencies {
        implementation "androidx.annotation:annotation:1.9.0"
        implementation "androidx.core:core:1.13.1"
        implementation "androidx.drawerlayout:drawerlayout:1.2.0"
        implementation "androidx.preference:preference:1.2.1"
        implementation "androidx.viewpager:viewpager:1.0.0"
        implementation "com.google.android.material:material:1.12.0"
        implementation "com.google.guava:guava:24.1-jre"
        /*
        CDXC:AndroidSshTransport 2026-05-18-02:56:
        Play-compliant Ghostex Android cannot depend on Termux `pkg` installing
        OpenSSH/sshpass/scp into an executable app-private prefix. Use SSHJ for
        app-owned SSH exec and SFTP transport so remote CLI calls and image
        uploads work at modern target SDKs without runtime package installs.

        CDXC:AndroidSshTransport 2026-05-18-04:04:
        Declare bcprov directly because Ghostex replaces Android's platform
        `BC` provider with the bundled BouncyCastle provider before SSHJ
        negotiates ECDH; relying only on SSHJ's transitive runtime dependency
        leaves the provider class unavailable to app source compilation.
        */
        implementation "com.hierynomus:sshj:0.40.0"
        implementation "org.bouncycastle:bcprov-jdk18on:1.80.2"
        implementation "org.slf4j:slf4j-nop:2.0.17"
        implementation "io.noties.markwon:core:$markwonVersion"
        implementation "io.noties.markwon:ext-strikethrough:$markwonVersion"
        implementation "io.noties.markwon:linkify:$markwonVersion"
        implementation "io.noties.markwon:recycler:$markwonVersion"
        implementation 'com.google.guava:listenablefuture:9999.0-empty-to-avoid-conflict-with-guava'

        implementation project(":terminal-view")
        implementation project(":termux-shared")
    }

    defaultConfig {
        applicationId project.ext.ghostexRuntimePackageName
        minSdkVersion project.properties.minSdkVersion.toInteger()
        targetSdkVersion project.properties.targetSdkVersion.toInteger()
        /*
        CDXC:AndroidBranding 2026-05-17-15:08:
        APK metadata is part of the released product identity. Keep the runtime
        package side-by-side with upstream Termux, and use Ghostex-owned version
        inputs so distributed builds do not present as upstream Termux 0.118.0.
        */
        versionCode ghostexAppVersionCode
        versionName ghostexAppVersionName

        validateVersionName(versionName)

        buildConfigField "String", "TERMUX_PACKAGE_VARIANT", "\"" + project.ext.packageVariant + "\"" // Used by TermuxApplication class
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        manifestPlaceholders.TERMUX_PACKAGE_NAME = project.ext.ghostexRuntimePackageName
        // CDXC:AndroidBranding 2026-05-17-10:13: Release builds should present as Ghostex Android while retaining the Termux Java namespace for upstream sync.
        // CDXC:AndroidBranding 2026-05-17-10:37: APK artifacts use a Ghostex Android filename so release testing does not ship Termux-branded build outputs from this Android submodule.
        // CDXC:AndroidSideBySideInstall 2026-05-17-23:39: Manifest package-sensitive surfaces must use the Ghostex runtime id so Android can install Ghostex beside upstream Termux.
        manifestPlaceholders.TERMUX_APP_NAME = "Ghostex"
        manifestPlaceholders.TERMUX_API_APP_NAME = "Termux:API"
        manifestPlaceholders.TERMUX_BOOT_APP_NAME = "Termux:Boot"
        manifestPlaceholders.TERMUX_FLOAT_APP_NAME = "Termux:Float"
        manifestPlaceholders.TERMUX_STYLING_APP_NAME = "Termux:Styling"
        manifestPlaceholders.TERMUX_TASKER_APP_NAME = "Termux:Tasker"
        manifestPlaceholders.TERMUX_WIDGET_APP_NAME = "Termux:Widget"

        externalNativeBuild {
            ndkBuild {
                cFlags "-std=c11", "-Wall", "-Wextra", "-Werror", "-Os", "-fno-stack-protector", "-Wl,--gc-sections"
                arguments "GHOSTEX_BOOTSTRAP_DIR=" + ghostexPreparedBootstrapDir(project).absolutePath
            }
        }

        splits {
            abi {
                enable ((gradle.startParameter.taskNames.any { it.contains("Debug") } && splitAPKsForDebugBuilds == "1") ||
                    (gradle.startParameter.taskNames.any { it.contains("Release") } && splitAPKsForReleaseBuilds == "1"))
                reset ()
                include 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                universalApk true
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('testkey_untrusted.jks')
            keyAlias 'alias'
            storePassword 'xrj45yWGLbsO7W0v'
            keyPassword 'xrj45yWGLbsO7W0v'
        }
        if (ghostexReleaseSigning.configured) {
            /*
            CDXC:AndroidReleaseSurface 2026-05-17-15:02:
            A publishable Ghostex Android release must use signing material
            supplied by the local machine or CI, not the upstream Termux shared
            test key. Keep debug signing available for developer builds while
            release signing stays explicit and outside the repository.
            */
            release {
                storeFile file(ghostexReleaseSigning.storeFile)
                keyAlias ghostexReleaseSigning.keyAlias
                storePassword ghostexReleaseSigning.storePassword
                keyPassword ghostexReleaseSigning.keyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false // Reproducible builds
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (ghostexReleaseSigning.configured) signingConfig signingConfigs.release
        }

        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true

        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    externalNativeBuild {
        ndkBuild {
            path "src/main/cpp/Android.mk"
        }
    }

    lint {
        disable 'ProtectedPermissions'
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def abi = output.getFilter(com.android.build.OutputFile.ABI)
            def outputTag = apkVersionTag
                ? apkVersionTag
                : ghostexAndroidApkOutputTag(project.ext.packageVariant, variant.buildType.name,
                    android.defaultConfig.versionName, android.defaultConfig.versionCode)
            if (variant.buildType.name == "debug") {
                outputFileName = new File("ghostex-android_" + outputTag + "_" + (abi ? abi : "universal") + ".apk")
            } else if (variant.buildType.name == "release") {
                outputFileName = new File("ghostex-android_" + outputTag + "_" + (abi ? abi : "universal") + ".apk")
            }
        }
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
    /*
    CDXC:AndroidReleaseSurface 2026-05-17-17:00:
    Target API 35 release builds require a Robolectric version that can pick a
    modern Android SDK for app/manifest-backed unit tests.
    */
    testImplementation "org.robolectric:robolectric:4.16.1"
    /*
    CDXC:AndroidReleaseE2E 2026-05-17-16:30:
    Release readiness needs a real-device Tailscale/SSH/Ghostex/zmx proof, not
    only JVM source gates. Keep the instrumentation dependency scoped to
    androidTest so normal app builds do not ship test runners or E2E code.
    */
    androidTestImplementation "androidx.test:runner:1.6.2"
    androidTestImplementation "androidx.test.ext:junit:1.2.1"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:1.1.5"
}

def resolveGhostexAndroidReleaseSigning(project) {
    def signing = [
        storeFile: stringPropertyOrEnv(project, "ghostexAndroidSigningStoreFile", "GHOSTEX_ANDROID_SIGNING_STORE_FILE"),
        storePassword: stringPropertyOrEnv(project, "ghostexAndroidSigningStorePassword", "GHOSTEX_ANDROID_SIGNING_STORE_PASSWORD"),
        keyAlias: stringPropertyOrEnv(project, "ghostexAndroidSigningKeyAlias", "GHOSTEX_ANDROID_SIGNING_KEY_ALIAS"),
        keyPassword: stringPropertyOrEnv(project, "ghostexAndroidSigningKeyPassword", "GHOSTEX_ANDROID_SIGNING_KEY_PASSWORD")
    ]
    def configuredValues = signing.findAll { _, value -> value != null && !value.trim().isEmpty() }
    if (!configuredValues.isEmpty() && configuredValues.size() != signing.size()) {
        throw new GradleException("Configure all Ghostex Android release signing values: GHOSTEX_ANDROID_SIGNING_STORE_FILE, GHOSTEX_ANDROID_SIGNING_STORE_PASSWORD, GHOSTEX_ANDROID_SIGNING_KEY_ALIAS, and GHOSTEX_ANDROID_SIGNING_KEY_PASSWORD.")
    }
    signing.configured = configuredValues.size() == signing.size()
    return signing
}

def stringPropertyOrEnv(project, String propertyName, String envName) {
    def propertyValue = project.findProperty(propertyName)
    if (propertyValue != null && !propertyValue.toString().trim().isEmpty()) return propertyValue.toString()
    def envValue = System.getenv(envName)
    return envValue == null || envValue.trim().isEmpty() ? null : envValue
}

def isGhostexAndroidReleaseSigningRequired(project) {
    def value = stringPropertyOrEnv(project, "ghostexAndroidRequireReleaseSigning", "GHOSTEX_ANDROID_REQUIRE_RELEASE_SIGNING")
    return value != null && ["1", "true", "yes"].contains(value.toLowerCase(java.util.Locale.US))
}

def positiveIntegerPropertyOrEnv(project, String propertyName, String envName, int defaultValue) {
    def value = stringPropertyOrEnv(project, propertyName, envName)
    if (value == null) return defaultValue
    try {
        int parsed = Integer.parseInt(value)
        if (parsed > 0) return parsed
    } catch (NumberFormatException ignored) {
    }
    throw new GradleException(envName + " must be a positive integer.")
}

def ghostexAndroidApkOutputTag(String packageVariant, String buildType, String versionName, Integer versionCode) {
    /*
    CDXC:AndroidBranding 2026-05-17-16:25:
    Release APK/AAB filenames are handoff artifacts. Include Ghostex-owned
    version name/code by default so install-test and publish artifacts are
    traceable without opening output metadata, while still allowing CI to
    override the APK tag when it needs a channel or commit label.
    */
    def safeVersionName = versionName.replaceAll(/[^0-9A-Za-z._-]/, "_")
    return "v" + safeVersionName + "+" + versionCode + "-" + packageVariant + "-" + buildType
}

task copyGhostexReleaseBundle() {
    mustRunAfter "bundleRelease"
    doLast {
        /*
        CDXC:AndroidReleaseCI 2026-05-17-18:08:
        Local release verification should produce the same Ghostex-named Android
        App Bundle that CI uploads for store submission, not only Gradle's
        default `app-release.aab` filename.
        */
        def bundleDir = new File(buildDir, "outputs/bundle/release")
        def sourceBundles = bundleDir.listFiles({ File dir, String name ->
            name.endsWith(".aab") && !name.startsWith("ghostex-android_")
        } as FilenameFilter) ?: [] as File[]
        if (sourceBundles.length != 1) {
            throw new GradleException("Expected exactly one generated release AAB in " + bundleDir + ", found " + sourceBundles.length + ".")
        }
        def previousGhostexBundles = bundleDir.listFiles({ File dir, String name ->
            name.endsWith(".aab") && name.startsWith("ghostex-android_")
        } as FilenameFilter) ?: [] as File[]
        previousGhostexBundles.each { it.delete() }
        def outputTag = ghostexAndroidApkOutputTag(project.ext.packageVariant, "release",
            android.defaultConfig.versionName, android.defaultConfig.versionCode)
        def output = new File(bundleDir, "ghostex-android_" + outputTag + ".aab")
        java.nio.file.Files.copy(sourceBundles[0].toPath(), output.toPath(), java.nio.file.StandardCopyOption.REPLACE_EXISTING)
    }
}

task cleanGhostexReleaseApkOutputs() {
    doLast {
        /*
        CDXC:AndroidReleaseCI 2026-05-17-21:44:
        Release APK directories can retain stale Ghostex split/universal files
        when Gradle task inputs change between local and CI builds. Remove prior
        Ghostex APK handoff artifacts before packaging so checksums, signature
        proof, and upload globs describe only the current release build.
        */
        def apkDir = new File(buildDir, "outputs/apk/release")
        if (!apkDir.exists()) return
        (apkDir.listFiles({ File dir, String name ->
            (name.startsWith("ghostex-android_") && name.endsWith(".apk")) ||
                name == "SHA256SUMS" ||
                name == "output-metadata.json"
        } as FilenameFilter) ?: [] as File[]).each { file ->
            if (!file.delete()) {
                throw new GradleException("Could not remove stale Ghostex release APK artifact: " + file)
            }
        }
    }
}

task generateGhostexReleaseChecksums() {
    dependsOn "assembleRelease", "bundleRelease", "copyGhostexReleaseBundle"
    mustRunAfter "copyGhostexReleaseBundle"
    doLast {
        /*
        CDXC:AndroidReleaseCI 2026-05-17-20:58:
        Release artifacts need the same reviewable checksum evidence locally
        and in CI. Generate APK/AAB SHA256SUMS from Gradle after the Ghostex
        bundle copy runs so `npm run android:verify-release:local` and the
        release-candidate workflow prove identical artifact handoff state.
        */
        def apkDir = new File(buildDir, "outputs/apk/release")
        def bundleDir = new File(buildDir, "outputs/bundle/release")
        def apks = ghostexReleaseApksFromMetadata(apkDir)
        if (apks.isEmpty()) {
            throw new GradleException("No Ghostex Android release APKs found in " + apkDir + ".")
        }
        def bundles = ghostexReleaseArtifacts(bundleDir, ~/ghostex-android_.*\.aab/)
        if (bundles.size() != 1) {
            throw new GradleException("Expected exactly one Ghostex-named Android release AAB in " + bundleDir + ", found " + bundles.size() + ".")
        }
        writeGhostexReleaseSha256Sums(new File(apkDir, "SHA256SUMS"), apks)
        writeGhostexReleaseSha256Sums(new File(bundleDir, "SHA256SUMS"), bundles)
    }
}

task verifyGhostexReleaseChecksums() {
    dependsOn generateGhostexReleaseChecksums
    doLast {
        /*
        CDXC:AndroidReleaseCI 2026-05-17-20:58:
        A release verification pass is incomplete if the APK/AAB checksum files
        are stale or describe a different artifact set. Re-read SHA256SUMS and
        recompute digests so local release validation catches drift before a
        candidate is handed to QA or uploaded by CI.
        */
        def apkDir = new File(buildDir, "outputs/apk/release")
        def bundleDir = new File(buildDir, "outputs/bundle/release")
        verifyGhostexReleaseSha256Sums(new File(apkDir, "SHA256SUMS"),
            ghostexReleaseApksFromMetadata(apkDir),
            "release APK")
        verifyGhostexReleaseSha256Sums(new File(bundleDir, "SHA256SUMS"),
            ghostexReleaseArtifacts(bundleDir, ~/ghostex-android_.*\.aab/),
            "release AAB")
    }
}

task versionName {
    doLast {
        print android.defaultConfig.versionName
    }
}

def validateVersionName(String versionName) {
    // https://semver.org/spec/v2.0.0.html#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
    // ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
    if (!java.util.regex.Pattern.matches("^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\+([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?\$", versionName))
        throw new GradleException("The versionName '"  + versionName + "' is not a valid version as per semantic version '2.0.0' spec in the format 'major.minor.patch(-prerelease)(+buildmetadata)'. https://semver.org/spec/v2.0.0.html.")
}

def downloadBootstrap(String arch, String expectedChecksum, String version) {
    def digest = java.security.MessageDigest.getInstance("SHA-256")

    def localUrl = "src/main/cpp/bootstrap-" + arch + ".zip"
    def file = new File(projectDir, localUrl)
    if (file.exists()) {
        def buffer = new byte[8192]
        def input = new FileInputStream(file)
        while (true) {
            def readBytes = input.read(buffer)
            if (readBytes < 0) break
            digest.update(buffer, 0, readBytes)
        }
        def checksum = new BigInteger(1, digest.digest()).toString(16)
        while (checksum.length() < 64) { checksum = "0" + checksum }
        if (checksum == expectedChecksum) {
            return
        } else {
            logger.quiet("Deleting old local file with wrong hash: " + localUrl + ": expected: " + expectedChecksum + ", actual: " + checksum)
            file.delete()
        }
    }

    def remoteUrl = "https://github.com/termux/termux-packages/releases/download/bootstrap-" + version + "/bootstrap-" + arch + ".zip"
    logger.quiet("Downloading " + remoteUrl + " ...")

    file.parentFile.mkdirs()
    def out = new BufferedOutputStream(new FileOutputStream(file))

    def connection = new URL(remoteUrl).openConnection()
    connection.setInstanceFollowRedirects(true)
    def digestStream = new java.security.DigestInputStream(connection.inputStream, digest)
    out << digestStream
    out.close()

    def checksum = new BigInteger(1, digest.digest()).toString(16)
    while (checksum.length() < 64) { checksum = "0" + checksum }
    if (checksum != expectedChecksum) {
        file.delete()
        throw new GradleException("Wrong checksum for " + remoteUrl + ": expected: " + expectedChecksum + ", actual: " + checksum)
    }
}

clean {
    doLast {
        def tree = fileTree(new File(projectDir, 'src/main/cpp'))
        tree.include 'bootstrap-*.zip'
        tree.each { it.delete() }
    }
}

task downloadBootstraps() {
    doLast {
        def packageVariant = project.ext.packageVariant
        if (packageVariant == "apt-android-7") {
            def version = "2026.02.12-r1" + "%2B" + "apt.android-7"
            downloadBootstrap("aarch64", "ea2aeba8819e517db711f8c32369e89e7c52cee73e07930ff91185e1ab93f4f3", version)
            downloadBootstrap("arm", "a38f4d3b2f735f83be2bf54eff463e86dc32a3e2f9f861c1557c4378d249c018", version)
            downloadBootstrap("i686", "f5bc0b025b9f3b420b5fcaeefc064f888f5f22a0d6fd7090f4aac0c33eb3555b", version)
            downloadBootstrap("x86_64", "b7fd0f2e3a4de534be3144f9f91acc768630fc463eaf134ab2e64c545e834f7a", version)
        } else if (packageVariant == "apt-android-5") {
            def version = "2022.04.28-r6" + "+" + packageVariant
            downloadBootstrap("aarch64", "913609d439415c828c5640be1b0561467e539cb1c7080662decaaca2fb4820e7", version)
            downloadBootstrap("arm", "26bfb45304c946170db69108e5eb6e3641aad751406ce106c80df80cad2eccf8", version)
            downloadBootstrap("i686", "46dcfeb5eef67ba765498db9fe4c50dc4690805139aa0dd141a9d8ee0693cd27", version)
            downloadBootstrap("x86_64", "615b590679ee6cd885b7fd2ff9473c845e920f9b422f790bb158c63fe42b8481", version)
        } else {
            throw new GradleException("Unsupported TERMUX_PACKAGE_VARIANT \"" + packageVariant + "\"")
        }
    }
}

def validateGhostexRuntimePackageName(String packageName, String upstreamPackageName) {
    if (!(packageName ==~ /^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$/)) {
        throw new GradleException("Ghostex Android package id is invalid: " + packageName)
    }
    if (packageName != upstreamPackageName && packageName.length() != upstreamPackageName.length()) {
        throw new GradleException("Ghostex Android package id " + packageName + " must be " + upstreamPackageName.length() + " bytes long while the bundled bootstrap is binary-patched from " + upstreamPackageName + ".")
    }
}

def ghostexPreparedBootstrapDir(project) {
    return new File(project.buildDir, "generated/ghostex/bootstrap")
}

def replaceGhostexBootstrapPrefix(byte[] bytes, byte[] source, byte[] target) {
    if (source.length != target.length) {
        throw new GradleException("Ghostex bootstrap prefix replacement must keep byte length identical.")
    }
    byte[] output = java.util.Arrays.copyOf(bytes, bytes.length)
    int replacements = 0
    for (int i = 0; i <= output.length - source.length; i++) {
        boolean match = true
        for (int j = 0; j < source.length; j++) {
            if (output[i + j] != source[j]) {
                match = false
                break
            }
        }
        if (match) {
            System.arraycopy(target, 0, output, i, target.length)
            replacements++
            i += source.length - 1
        }
    }
    return [bytes: output, replacements: replacements]
}

task prepareGhostexBootstrapArchives() {
    dependsOn downloadBootstraps
    def preparedDir = ghostexPreparedBootstrapDir(project)
    inputs.property("ghostexRuntimePackageName", project.ext.ghostexRuntimePackageName)
    inputs.files(["aarch64", "arm", "i686", "x86_64"].collect { arch -> new File(projectDir, "src/main/cpp/bootstrap-" + arch + ".zip") })
    outputs.dir(preparedDir)
    doLast {
        /*
        CDXC:AndroidSideBySideInstall 2026-05-17-23:39:
        The user needs a Ghostex Android APK that installs beside Termux.
        Generate build-local bootstrap archives whose hardcoded app-data root
        matches the Ghostex app id, while leaving upstream downloaded bootstrap
        zips in `src/main/cpp` untouched for easier upstream synchronization.

        CDXC:AndroidSideBySideInstall 2026-05-18-00:32:
        Termux package scripts also reference app-private cache paths such as
        `/data/data/com.termux/cache/apt`, not only `$PREFIX`. Patch the whole
        `/data/data/<package>` root so `pkg install` does not try to write into
        upstream Termux's private cache directory.
        */
        validateGhostexRuntimePackageName(project.ext.ghostexRuntimePackageName, project.ext.upstreamTermuxRuntimePackageName)
        preparedDir.mkdirs()
        def sourcePrefix = ("/data/data/" + project.ext.upstreamTermuxRuntimePackageName).getBytes(java.nio.charset.StandardCharsets.UTF_8)
        def targetPrefix = ("/data/data/" + project.ext.ghostexRuntimePackageName).getBytes(java.nio.charset.StandardCharsets.UTF_8)
        ["aarch64", "arm", "i686", "x86_64"].each { arch ->
            def sourceArchive = new File(projectDir, "src/main/cpp/bootstrap-" + arch + ".zip")
